<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olivin — Cinematic Story</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cinema', 'Playfair Display', 'Georgia', serif;
      overflow: hidden;
      background: #0a0f0a;
    }

    /* Cinematic container */
    .cinematic-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Video background */
    #bgVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      filter: brightness(0.85) contrast(1.05) saturate(1.1);
    }

    /* Dark gradient overlay for cinematic feel */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.4) 0%,
        rgba(0, 0, 0, 0.2) 30%,
        rgba(0, 0, 0, 0.5) 70%,
        rgba(0, 0, 0, 0.7) 100%
      );
      pointer-events: none;
    }

    /* Letterbox bars (cinematic aspect ratio) */
    .letterbox {
      position: absolute;
      left: 0;
      right: 0;
      height: 8vh;
      background: #000;
      z-index: 10;
      pointer-events: none;
    }

    .letterbox-top {
      top: 0;
    }

    .letterbox-bottom {
      bottom: 0;
    }

    /* Text container */
    .text-container {
      position: absolute;
      bottom: 20%;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 20;
      padding: 0 20px;
    }

    .cinematic-text {
      color: #fff;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.3;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Playfair Display', 'Georgia', serif;
    }

    .cinematic-text.active {
      opacity: 1;
    }

    .cinematic-text.fade-out {
      opacity: 0;
    }

    /* Small subtitle style */
    .cinematic-text.small {
      font-size: clamp(1rem, 3vw, 1.8rem);
      letter-spacing: 0.15em;
      font-weight: 300;
    }

    /* Logo reveal at the end */
    .logo-reveal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 30;
      opacity: 0;
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-reveal.active {
      opacity: 1;
    }

    .logo-reveal h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      color: #d4af37;
      font-weight: 600;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      font-family: 'Cinema', 'Playfair Display', serif;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .logo-reveal p {
      color: rgba(255, 255, 255, 0.8);
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      letter-spacing: 0.1em;
      font-weight: 300;
    }

    /* Progress indicator (cinematic timeline) */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      z-index: 40;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #d4af37;
      transition: width linear;
    }

    /* Skip button */
    .skip-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 50;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .skip-btn:hover {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-color: #d4af37;
    }

    /* Animation for fade-in effect */
    @keyframes subtleGlow {
      0% { text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5); }
      100% { text-shadow: 0 2px 40px rgba(212, 175, 55, 0.3); }
    }

    .cinematic-text.active {
      animation: subtleGlow 2s ease-out;
    }
  </style>
</head>
<body>
  <div class="cinematic-container">
    <!-- Video background - replace with your actual video URL -->
    <video id="bgVideo" autoplay muted playsinline>
      <source src="https://assets.mixkit.co/videos/39719/39719-720.mp4" type="video/mp4">
      <!-- Replace with your Tuscany hills video -->
      Your browser does not support the video tag.
    </video>

    <!-- Cinematic overlays -->
    <div class="overlay"></div>
    <div class="letterbox letterbox-top"></div>
    <div class="letterbox letterbox-bottom"></div>

    <!-- Text container -->
    <div class="text-container">
      <div id="textDisplay" class="cinematic-text"></div>
    </div>

    <!-- Logo reveal -->
    <div id="logoReveal" class="logo-reveal">
      <h1>OLIVIN</h1>
      <p>Not an investment.<br>A place you return to.</p>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <!-- Skip button -->
    <button class="skip-btn" id="skipBtn">SKIP →</button>
  </div>

  <script>
    // Cinematic narrative sequence
    const narrative = [
      { text: "IN THE HILLS OF<br>SAN VINCENZO, TUSCANY", duration: 4000, small: false },
      { text: "Adopt one or more of these trees.", duration: 3500, small: false },
      { text: "Rooted in nature.<br>Growing for generations.", duration: 4000, small: false },
      { text: "So you can make memories here —<br>in a private villa,<br>by the pool,<br>with friends and family,<br>curated dinners under the Tuscan sky.", duration: 6000, small: true },
      { text: "Walk among your trees.<br>Watch them grow.<br>Receive oil from them yearly.", duration: 5000, small: true }
    ];

    let currentIndex = 0;
    let currentTimeout = null;
    let startTime = null;
    let progressInterval = null;
    let isPlaying = true;

    const textDisplay = document.getElementById('textDisplay');
    const logoReveal = document.getElementById('logoReveal');
    const progressFill = document.getElementById('progressFill');
    const skipBtn = document.getElementById('skipBtn');
    const video = document.getElementById('bgVideo');

    // Function to show text with fade effect
    function showText(index) {
      if (!isPlaying) return;
      
      if (index >= narrative.length) {
        // End of narrative - show logo
        showLogo();
        return;
      }

      const item = narrative[index];
      textDisplay.innerHTML = item.text;
      textDisplay.className = `cinematic-text ${item.small ? 'small' : ''}`;
      
      // Trigger reflow then add active class for fade in
      void textDisplay.offsetWidth;
      textDisplay.classList.add('active');
      
      // Start progress bar animation
      startProgressBar(item.duration);
      
      // Schedule fade out and next text
      currentTimeout = setTimeout(() => {
        // Fade out current text
        textDisplay.classList.remove('active');
        textDisplay.classList.add('fade-out');
        
        // Move to next text after fade out completes
        setTimeout(() => {
          textDisplay.classList.remove('fade-out');
          currentIndex++;
          showText(currentIndex);
        }, 800);
      }, item.duration);
    }

    // Start progress bar animation
    function startProgressBar(duration) {
      if (progressInterval) clearInterval(progressInterval);
      
      progressFill.style.width = '0%';
      const startTimeProgress = Date.now();
      
      progressInterval = setInterval(() => {
        const elapsed = Date.now() - startTimeProgress;
        const percent = (elapsed / duration) * 100;
        
        if (percent >= 100) {
          clearInterval(progressInterval);
          progressFill.style.width = '100%';
        } else {
          progressFill.style.width = `${percent}%`;
        }
      }, 16); // ~60fps
    }

    // Show logo reveal
    function showLogo() {
      // Clear any remaining timeouts
      if (currentTimeout) clearTimeout(currentTimeout);
      if (progressInterval) clearInterval(progressInterval);
      
      // Fade out text
      textDisplay.classList.remove('active');
      textDisplay.classList.add('fade-out');
      
      // Show logo with cinematic fade
      setTimeout(() => {
        textDisplay.style.display = 'none';
        logoReveal.classList.add('active');
        progressFill.style.width = '100%';
      }, 800);
    }

    // Skip to end
    function skipToEnd() {
      isPlaying = false;
      
      // Clear all timers
      if (currentTimeout) clearTimeout(currentTimeout);
      if (progressInterval) clearInterval(progressInterval);
      
      // Immediately fade out text and show logo
      textDisplay.classList.remove('active');
      textDisplay.classList.add('fade-out');
      
      setTimeout(() => {
        textDisplay.style.display = 'none';
        logoReveal.classList.add('active');
        progressFill.style.width = '100%';
      }, 300);
    }

    // Reset and replay the sequence
    function replaySequence() {
      isPlaying = true;
      currentIndex = 0;
      textDisplay.style.display = 'block';
      logoReveal.classList.remove('active');
      textDisplay.classList.remove('active', 'fade-out');
      
      // Clear any existing timers
      if (currentTimeout) clearTimeout(currentTimeout);
      if (progressInterval) clearInterval(progressInterval);
      
      // Start from beginning
      showText(0);
    }

    // Event listeners
    skipBtn.addEventListener('click', skipToEnd);
    
    // Optional: Click anywhere to skip (cinematic convention)
    document.body.addEventListener('click', skipToEnd);
    
    // Start the sequence when video can play
    video.addEventListener('canplay', () => {
      showText(0);
    });
    
    // If video is already loaded
    if (video.readyState >= 3) {
      showText(0);
    }
    
    // Optional: Replay when video ends
    video.addEventListener('ended', () => {
      // Don't auto-replay, but you can uncomment the line below if desired
      // video.play();
    });

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
      if (currentTimeout) clearTimeout(currentTimeout);
      if (progressInterval) clearInterval(progressInterval);
    });
  </script>
</body>
</html>
