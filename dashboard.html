<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-stone-100">

<div class="max-w-7xl mx-auto py-10 px-6">

    <!-- HEADER -->

    <div class="flex justify-between items-center mb-10">

        <div>

            <h1 class="text-4xl font-bold">
                🌳 My Portfolio
            </h1>

            <p class="text-stone-500">
                Trees owned by your connected wallet
            </p>

        </div>

        <button
            id="refreshPortfolio"
            class="bg-green-700 text-white px-5 py-3 rounded-xl">
            Refresh
        </button>

    </div>


    <!-- SUMMARY -->

    <div class="grid md:grid-cols-4 gap-6 mb-10">

        <div class="bg-white rounded-2xl shadow p-6">

            <div class="text-stone-500">
                Wallet
            </div>

            <div
                id="walletAddress"
                class="font-mono text-sm break-all mt-2">
            </div>

        </div>


        <div class="bg-white rounded-2xl shadow p-6">

            <div class="text-stone-500">
                OLV Balance
            </div>

            <div
                id="olvBalance"
                class="text-3xl font-bold mt-3">
                0
            </div>

        </div>


        <div class="bg-white rounded-2xl shadow p-6">

            <div class="text-stone-500">
                Trees Owned
            </div>

            <div
                id="treeCount"
                class="text-3xl font-bold mt-3">
                0
            </div>

        </div>


        <div class="bg-white rounded-2xl shadow p-6">

            <div class="text-stone-500">
                Total Shares
            </div>

            <div
                id="shareCount"
                class="text-3xl font-bold mt-3">
                0
            </div>

        </div>

    </div>


    <!-- TREE GRID -->

    <div
        id="treeGrid"
        class="grid lg:grid-cols-3 gap-8">

    </div>

</div>

<script type="module">

import { loadPortfolio } from "./portfolio.js";

async function renderPortfolio(){

    const p = await loadPortfolio();

    document.getElementById("walletAddress").innerText =
        p.wallet;

    document.getElementById("olvBalance").innerText =
        p.olvBalance.toLocaleString();

    document.getElementById("treeCount").innerText =
        p.totalTrees;

    document.getElementById("shareCount").innerText =
        p.totalShares.toLocaleString();

    const grid = document.getElementById("treeGrid");

    grid.innerHTML = "";

    p.trees.forEach(tree=>{

        const card = document.createElement("div");

        card.className =
            "bg-white rounded-3xl shadow hover:shadow-xl transition overflow-hidden";

        card.innerHTML = `

            <img
                src="${tree.metadata?.photo_url ?? 'https://placehold.co/600x400'}"
                class="h-56 w-full object-cover">

            <div class="p-6">

                <h2 class="text-2xl font-bold">
                    ${tree.metadata?.name ?? tree.treeId}
                </h2>

                <div class="mt-3 text-stone-600">

                    ${tree.metadata?.variety ?? ""}

                </div>

                <div class="mt-5">

                    <div class="flex justify-between">

                        <span>Shares</span>

                        <strong>

                            ${tree.sharesOwned}

                        </strong>

                    </div>

                    <div class="flex justify-between mt-2">

                        <span>Ownership</span>

                        <strong>

                            ${tree.ownershipPercent.toFixed(2)}%

                        </strong>

                    </div>

                    <div class="flex justify-between mt-2">

                        <span>Health</span>

                        <strong>

                            ${tree.metadata?.health_score ?? "--"}

                        </strong>

                    </div>

                </div>

                <button
                    class="mt-6 bg-green-700 text-white rounded-xl w-full py-3 openTree"

                    data-tree="${tree.treeId}">

                    View Tree

                </button>

            </div>

        `;

        grid.appendChild(card);

    });

    document.querySelectorAll(".openTree").forEach(btn=>{

        btn.addEventListener("click",()=>{

            const treeId =
                btn.getAttribute("data-tree");

            openTreeDetailModal(treeId);

        });

    });

}

document
.getElementById("refreshPortfolio")
.addEventListener("click",renderPortfolio);

renderPortfolio();

</script>

</body>
</html>
