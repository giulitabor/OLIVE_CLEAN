<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Olivium Dashboard</title>

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
    rel="stylesheet"
    href="./dashboard.css">

</head>

<body>

<div id="dashboard">

    <!-- ================================================= -->
    <!-- HEADER                                             -->
    <!-- ================================================= -->

    <header class="header">

        <div class="logo">
            🌳 OLIVIUM
        </div>

        <div class="wallet-section">

            <button id="connectWallet">

                Connect Wallet

            </button>

            <span id="walletAddress">

                Not Connected

            </span>

        </div>

    </header>

    <!-- ================================================= -->
    <!-- PORTFOLIO CARDS                                   -->
    <!-- ================================================= -->

    <section class="portfolio-grid">

        <div class="card">

            <h3>

                OLV Balance

            </h3>

            <div id="olvBalance">

                --

            </div>

        </div>

        <div class="card">

            <h3>

                Trees Owned

            </h3>

            <div id="treesOwned">

                --

            </div>

        </div>

        <div class="card">

            <h3>

                Shares Owned

            </h3>

            <div id="sharesOwned">

                --

            </div>

        </div>

        <div class="card">

            <h3>

                Portfolio Value

            </h3>

            <div id="portfolioValue">

                --

            </div>

        </div>

    </section>

    <!-- ================================================= -->
    <!-- TREE POSITIONS                                    -->
    <!-- ================================================= -->

    <section>

        <h2>

            My Trees

        </h2>

        <div id="treePositions">

        </div>

    </section>

</div>

<!-- ================================================= -->
<!-- LIBRARIES                                          -->
<!-- ================================================= -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@coral-xyz/anchor/dist/browser/index.js"></script>

<!-- ================================================= -->
<!-- YOUR SCRIPTS                                       -->
<!-- ================================================= -->

<script type="module" src="./dashboard.js"></script>

</body>

</html>
