<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --navy: #0a0e1a;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --text1: #f0e8d0;
    --text2: #a89880;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(201,168,76,0.2);
  }
  body {
    background: var(--navy);
    color: var(--text1);
    font-family: sans-serif;
    padding: 20px;
  }
  .card {
    background: var(--glass);
    border: 0.5px solid var(--border);
    border-radius: 24px;
    padding: 20px;
    margin: 12px 0;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .btn-primary {
    padding: 14px 20px;
    border-radius: 40px;
    background: linear-gradient(135deg, rgba(201,168,76,0.3), rgba(201,168,76,0.15));
    border: 0.5px solid var(--gold);
    color: var(--gold);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .btn-secondary {
    background: var(--glass);
    color: var(--text2);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="card-title">✅ CSS Test</div>
    <p style="color: var(--text1);">This card has a glass effect with a gold border.</p>
    <button class="btn-primary">Primary Button</button>
    <br><br>
    <button class="btn-primary btn-secondary">Secondary Button</button>
  </div>
</body>
</html>
